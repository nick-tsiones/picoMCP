name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: cachix/install-nix-action@v31.10.6
      - run: nix develop -c just install
      - run: nix develop -c just ci
      - run: nix develop -c just npm-smoke
      - run: mkdir -p dist-npm
      - run: nix develop -c corepack pnpm --filter ./packages/core pack --pack-destination "$GITHUB_WORKSPACE/dist-npm"
      - run: |
          CORE_TARBALL="$(find "$GITHUB_WORKSPACE/dist-npm" -maxdepth 1 -name 'cat-cave-qdcli-core-*.tgz' -print -quit)"
          test -n "$CORE_TARBALL"
          npm publish "$CORE_TARBALL" --access public
      - run: nix develop -c corepack pnpm --filter ./packages/cli pack --pack-destination "$GITHUB_WORKSPACE/dist-npm"
      - run: |
          CLI_TARBALL="$(find "$GITHUB_WORKSPACE/dist-npm" -maxdepth 1 -name 'cat-cave-qdcli-*.tgz' ! -name 'cat-cave-qdcli-core-*.tgz' -print -quit)"
          test -n "$CLI_TARBALL"
          npm publish "$CLI_TARBALL" --access public
