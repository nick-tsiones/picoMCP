name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: cachix/install-nix-action@v31.10.6
      - run: nix develop -c just install
      - run: nix develop -c just ci
      - run: nix develop -c just npm-smoke
      - run: nix develop -c corepack pnpm exec changeset publish --no-git-tag
